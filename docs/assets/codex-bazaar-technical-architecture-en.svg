<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000">
<defs><style>
.bg{fill:#0b1018}.zone{fill:#111a27;stroke:#34465f;stroke-width:2}.node{fill:#172235;stroke:#526b8d;stroke-width:2}.edge{fill:none;stroke:#7cd4a5;stroke-width:3;marker-end:url(#a)}.dash{fill:none;stroke:#e5b567;stroke-width:3;stroke-dasharray:9 7;marker-end:url(#b)}.title{fill:#f5f7fa;font:700 38px Arial}.sub{fill:#9baabc;font:19px Arial}.zt{fill:#e5b567;font:700 21px Arial}.nt{fill:#fff;font:700 18px Arial}.tx{fill:#c2ccda;font:14px Arial}.sm{fill:#92a2b7;font:12px Arial}.flow{fill:#7cd4a5;font:700 13px Arial}.stepT{fill:#fff;font:700 15px Arial}
</style><marker id="a" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#7cd4a5"/></marker><marker id="b" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#e5b567"/></marker></defs>
<rect class="bg" width="1600" height="1000"/><text class="title" x="60" y="60">Codex Bazaar · Self-hostable peer-to-peer trade architecture</text><text class="sub" x="60" y="94">Conversational entry, verifiable listings, merchant-hosted content, burn-after-read relay, and payment handoff</text>
<rect class="zone" x="40" y="125" width="1520" height="175" rx="18"/><text class="zt" x="65" y="158">Client layer · two independent computers</text>
<rect class="node" x="75" y="180" width="300" height="90" rx="13"/><text class="nt" x="100" y="215">Computer A · Merchant Codex</text><text class="tx" x="100" y="245">Publish / accept / ship · local identity</text>
<rect class="node" x="650" y="180" width="300" height="90" rx="13"/><text class="nt" x="675" y="215">$codexbazaar Skill</text><text class="tx" x="675" y="245">Intent routing · session state · hidden internal IDs</text>
<rect class="node" x="1225" y="180" width="300" height="90" rx="13"/><text class="nt" x="1250" y="215">Computer B · Buyer Codex</text><text class="tx" x="1250" y="245">Search / buy / receive · local verification</text>
<path class="edge" d="M375 225H640"/><path class="edge" d="M950 225H1215"/>

<rect class="zone" x="40" y="330" width="930" height="405" rx="18"/><text class="zt" x="65" y="365">Protocol and relay · Cloudflare demo or self-hosted</text>
<rect class="node" x="75" y="395" width="255" height="120" rx="13"/><text class="nt" x="100" y="430">Ping Worker</text><text class="tx" x="100" y="460">Identity / presence / unread count</text><text class="sm" x="100" y="490">Message deleted from relay after read</text>
<rect class="node" x="370" y="395" width="255" height="120" rx="13"/><text class="nt" x="395" y="430">Market Indexer</text><text class="tx" x="395" y="460">Signed listing events / search summaries</text><text class="sm" x="395" y="490">No product details or source images</text>
<rect class="node" x="665" y="395" width="255" height="120" rx="13"/><text class="nt" x="690" y="430">Order / Pay Worker</text><text class="tx" x="690" y="460">Order state / checkout handoff</text><text class="sm" x="690" y="490">Mock payment isolated from real adapters</text>
<rect class="node" x="75" y="565" width="255" height="120" rx="13"/><text class="nt" x="100" y="600">Durable Objects</text><text class="tx" x="100" y="630">Short messages / temporary state</text><text class="sm" x="100" y="660">Minimal storage · replaceable implementation</text>
<rect class="node" x="370" y="565" width="255" height="120" rx="13"/><text class="nt" x="395" y="600">Signed event log</text><text class="tx" x="395" y="630">Ed25519 · sequence · previous</text><text class="sm" x="395" y="660">Append-only updates; history is tamper-evident</text>
<rect class="node" x="665" y="565" width="255" height="120" rx="13"/><text class="nt" x="690" y="600">Compliance attestations</text><text class="tx" x="690" y="630">Rule version / jurisdiction / content hash</text><text class="sm" x="690" y="660">Independent signatures; multi-provider verification</text>
<path class="edge" d="M202 515V555"/><path class="edge" d="M497 515V555"/><path class="edge" d="M792 515V555"/>

<rect class="zone" x="1010" y="330" width="550" height="405" rx="18"/><text class="zt" x="1035" y="365">Self-hosted participants and external trust boundary</text>
<rect class="node" x="1045" y="395" width="480" height="120" rx="13"/><text class="nt" x="1070" y="430">Merchant Node</text><text class="tx" x="1070" y="460">Private key / details / source images / HTTP endpoint</text><text class="sm" x="1070" y="490">Buyer fetches on demand; details unavailable when offline</text>
<rect class="node" x="1045" y="565" width="225" height="120" rx="13"/><text class="nt" x="1070" y="600">Payment Provider</text><text class="tx" x="1070" y="630">Stripe / WeChat Pay / Alipay</text><text class="sm" x="1070" y="660">Official checkout and callbacks</text>
<rect class="node" x="1300" y="565" width="225" height="120" rx="13"/><text class="nt" x="1325" y="600">Buyer-side verification</text><text class="tx" x="1325" y="630">Ed25519 + SHA-256</text><text class="sm" x="1325" y="660">Verify signature, content, and image</text>
<path class="dash" d="M625 455V535H1000V455H1035"/><text class="flow" x="690" y="527">Signed summary / contentHash</text><path class="edge" d="M1045 505C970 540 970 625 1290 625"/><text class="flow" x="1015" y="554">Details and images on demand</text><path class="dash" d="M920 455H975V700H1020V625H1035"/><text class="flow" x="765" y="718">Checkout URL / Webhook</text>

<rect class="zone" x="40" y="770" width="1520" height="180" rx="18"/><text class="zt" x="65" y="805">One trade · data flow</text>
<text class="stepT" x="75" y="850">① Merchant signs + publishes</text><text class="stepT" x="365" y="850">② Indexer serves summary</text><text class="stepT" x="670" y="850">③ Buyer fetches details</text><text class="stepT" x="970" y="850">④ Verify signature + hash</text><text class="stepT" x="1280" y="850">⑤ Order + payment</text>
<path class="edge" d="M230 885H330"/><path class="edge" d="M535 885H630"/><path class="edge" d="M835 885H930"/><path class="edge" d="M1155 885H1245"/>
<text class="sm" x="75" y="920">The board stores only small events and proofs. Keys, images, addresses, and full payment records never enter the public index.</text>
</svg>
